<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
  </marker>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000000" flood-opacity="0.13"/>
  </filter>
</defs>
<rect width="1800" height="1100" fill="#f8fafc"/>
<text x="900.0" y="58" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="700" fill="#0f172a">Present vs Intended Ownership</text>
<text x="900.0" y="94" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="500" fill="#475569">Where the repo actually is, and where the architecture is headed.</text>
<g filter="url(#shadow)"><rect x="180" y="180" width="560" height="720" rx="16" fill="#eef2ff" stroke="#6366f1" stroke-width="3"/></g>
<text x="460.0" y="540.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="460.0" dy="0"></tspan>
</text><g filter="url(#shadow)"><rect x="1060" y="180" width="560" height="720" rx="16" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/></g>
<text x="1340.0" y="540.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="1340.0" dy="0"></tspan>
</text><text x="460" y="240" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#0f172a">
<tspan x="460" dy="0">Present</tspan>
</text><text x="1340" y="240" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#0f172a">
<tspan x="1340" dy="0">Intended</tspan>
</text><g filter="url(#shadow)"><rect x="280" y="330" width="360" height="90" rx="16" fill="#ffffff" stroke="#334155" stroke-width="3"/></g>
<text x="460.0" y="361.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="460.0" dy="0">runtime owns</tspan>
<tspan x="460.0" dy="28">process shell</tspan>
</text>
<g filter="url(#shadow)"><rect x="280" y="500" width="360" height="90" rx="16" fill="#ffffff" stroke="#334155" stroke-width="3"/></g>
<text x="460.0" y="531.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="460.0" dy="0">runtime owns most</tspan>
<tspan x="460.0" dy="28">live turn flow</tspan>
</text>
<g filter="url(#shadow)"><rect x="280" y="670" width="360" height="90" rx="16" fill="#ffffff" stroke="#334155" stroke-width="3"/></g>
<text x="460.0" y="701.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="460.0" dy="0">runtime hosts live</tspan>
<tspan x="460.0" dy="28">brokerage / floor / render seams</tspan>
</text>
<g filter="url(#shadow)"><rect x="1160" y="330" width="360" height="90" rx="16" fill="#ffffff" stroke="#334155" stroke-width="3"/></g>
<text x="1340.0" y="375.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="1340.0" dy="0">runtime owns shell</tspan>
</text>
<g filter="url(#shadow)"><rect x="1160" y="500" width="360" height="90" rx="16" fill="#ffffff" stroke="#334155" stroke-width="3"/></g>
<text x="1340.0" y="531.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="1340.0" dy="0">turn owns</tspan>
<tspan x="1340.0" dy="28">stage order</tspan>
</text>
<g filter="url(#shadow)"><rect x="1160" y="670" width="360" height="90" rx="16" fill="#ffffff" stroke="#334155" stroke-width="3"/></g>
<text x="1340.0" y="701.0" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#0f172a">
<tspan x="1340.0" dy="0">pipeline owns</tspan>
<tspan x="1340.0" dy="28">brokerage / floor / scene / fallback</tspan>
</text><line x1="640" y1="375" x2="1160" y2="375" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
<line x1="640" y1="545" x2="1160" y2="545" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" />
<line x1="640" y1="715" x2="1160" y2="715" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)" /><text x="900" y="965" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="500" fill="#64748b">
<tspan x="900" dy="0">These arrows are migration paths: the repo already knows the target shape, but runtime still carries most of the live weight.</tspan>
</text>
</svg>