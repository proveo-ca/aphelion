name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build static binary
        run: |
          make build-static STATIC_BIN=dist/aphelion

      - name: Package tarball
        run: |
          tar -czf "aphelion-linux-${{ matrix.arch }}.tar.gz" -C dist aphelion

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aphelion-linux-${{ matrix.arch }}
          path: aphelion-linux-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -name '*.tar.gz' -exec cp {} release/ \;
          (cd release && sha256sum -- *.tar.gz > checksums.txt)

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
