name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Architecture
        run: make architecture

      - name: Build
        run: make build

      - name: Test
        run: go test ./...
